<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#11151a"/>
      <stop offset="100%" stop-color="#020408"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-glow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow behind microscope -->
  <ellipse cx="600" cy="315" rx="280" ry="280" fill="url(#glow)"/>

  <!-- Decorative grid dots -->
  <g fill="#00d4ff" opacity="0.07">
    <circle cx="80"  cy="80"  r="3"/><circle cx="160" cy="80"  r="3"/><circle cx="240" cy="80"  r="3"/>
    <circle cx="80"  cy="160" r="3"/><circle cx="160" cy="160" r="3"/><circle cx="240" cy="160" r="3"/>
    <circle cx="80"  cy="240" r="3"/><circle cx="160" cy="240" r="3"/>
    <circle cx="960" cy="80"  r="3"/><circle cx="1040" cy="80" r="3"/><circle cx="1120" cy="80" r="3"/>
    <circle cx="960" cy="160" r="3"/><circle cx="1040" cy="160" r="3"/><circle cx="1120" cy="160" r="3"/>
    <circle cx="960" cy="240" r="3"/><circle cx="1040" cy="240" r="3"/>
    <circle cx="80"  cy="470" r="3"/><circle cx="160" cy="470" r="3"/>
    <circle cx="80"  cy="550" r="3"/><circle cx="160" cy="550" r="3"/><circle cx="240" cy="550" r="3"/>
    <circle cx="960" cy="470" r="3"/><circle cx="1040" cy="470" r="3"/>
    <circle cx="960" cy="550" r="3"/><circle cx="1040" cy="550" r="3"/><circle cx="1120" cy="550" r="3"/>
  </g>

  <!-- Thin border -->
  <rect x="1" y="1" width="1198" height="628" rx="0" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.18"/>

  <!-- Cyan accent lines -->
  <line x1="0" y1="628" x2="320" y2="628" stroke="#00d4ff" stroke-opacity="0.25" stroke-width="2"/>
  <line x1="880" y1="628" x2="1200" y2="628" stroke="#00d4ff" stroke-opacity="0.25" stroke-width="2"/>

  <!-- ── Microscope Icon ── -->
  <g transform="translate(440, 80) scale(2.6)" filter="url(#blur-glow)">
    <!-- Eyepiece top -->
    <rect x="28" y="6" width="6" height="14" rx="3" fill="#00d4ff"/>
    <!-- Eyepiece collar -->
    <rect x="24" y="18" width="14" height="5" rx="2" fill="#00d4ff"/>
    <!-- Main tube -->
    <rect x="29" y="22" width="4" height="22" rx="2" fill="#00d4ff"/>
    <!-- Stage -->
    <rect x="18" y="44" width="26" height="3" rx="1.5" fill="#00d4ff"/>
    <!-- Base -->
    <rect x="12" y="56" width="38" height="4" rx="2" fill="#00d4ff"/>
    <!-- Arm -->
    <rect x="22" y="30" width="14" height="3" rx="1.5" fill="#00d4ff"/>
    <!-- Condenser -->
    <ellipse cx="31" cy="50" rx="10" ry="3" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <!-- Objective -->
    <rect x="28" y="42" width="6" height="4" rx="1" fill="#00c4ef"/>
  </g>

  <!-- ── Title ── -->
  <text x="600" y="378" text-anchor="middle"
        font-family="'Segoe UI', 'Inter', Arial, sans-serif"
        font-size="72" font-weight="800" letter-spacing="-1"
        fill="white">
    VIRTUAL
    <tspan fill="#00d4ff"> MICROSCOPE</tspan>
  </text>

  <!-- ── Subtitle ── -->
  <text x="600" y="438" text-anchor="middle"
        font-family="'Segoe UI', 'Inter', Arial, sans-serif"
        font-size="28" font-weight="400" letter-spacing="3"
        fill="#8b9bb4">
    INTERACTIVE LABORATORY SIMULATOR
  </text>

  <!-- ── URL Badge ── -->
  <rect x="449" y="478" width="302" height="44" rx="22"
        fill="#00d4ff" fill-opacity="0.08"
        stroke="#00d4ff" stroke-width="1.2" stroke-opacity="0.45"/>
  <text x="600" y="506" text-anchor="middle"
        font-family="'Segoe UI', 'Inter', Arial, sans-serif"
        font-size="20" font-weight="600" letter-spacing="0.5"
        fill="#00d4ff" opacity="0.9">
    virtual-microscope.online
  </text>

  <!-- Arabic subtitle -->
  <text x="600" y="576" text-anchor="middle"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="22" font-weight="500"
        fill="#8b9bb4" opacity="0.6">
    مجهر افتراضي تفاعلي
  </text>
</svg>
